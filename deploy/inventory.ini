# Connection variables for Windows Server (Domain-joined)
# Using domain admin account from the user list
[WinServer:vars]
ansible_connection=winrm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_transport=ntlm
ansible_user=fathertime
ansible_password=Change.me123!
ansible_become_password=Change.me123!
ansible_port=5985

# Connection variables for Windows Clients (Local admin)
[WinClient:vars]
ansible_connection=winrm
ansible_winrm_server_cert_validation=ignore
ansible_winrm_transport=ntlm
ansible_user=drwho
ansible_password=Change.me123!
ansible_become_password=Change.me123!
ansible_port=5985

# Connection variables for Linux (using sudo-capable admin user)
# Using domain user accounts that should have sudo access
[linux:vars]
ansible_user=drwho
ansible_password=Change.me123!
ansible_become=yes
ansible_become_method=sudo
ansible_become_password=Change.me123!
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Connection variables for pfSense routers
# Using default admin account (not root)
[routers:vars]
ansible_user=admin
ansible_password=pfsense
ansible_become=yes
ansible_become_method=su
ansible_become_password=pfsense
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
